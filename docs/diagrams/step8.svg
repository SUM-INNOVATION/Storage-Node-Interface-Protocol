<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="ah-b" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6Z" fill="#0066CC"/></marker>
    <marker id="ah-r" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6Z" fill="#CC0000"/></marker>
    <marker id="ah-p" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6Z" fill="#7B2D8E"/></marker>
  </defs>

  <!-- SUMChain box -->
  <rect x="30" y="15" width="420" height="175" rx="8" fill="none" stroke="#7B2D8E" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="240" y="48" text-anchor="middle" fill="#7B2D8E" font-weight="bold" font-size="22">SUMChain</text>
  <ellipse cx="155" cy="115" rx="62" ry="28" fill="#7B2D8E"/>
  <text x="155" y="121" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">Val 1</text>
  <ellipse cx="335" cy="115" rx="62" ry="28" fill="#7B2D8E"/>
  <text x="335" y="121" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">Val 2</text>

  <!-- P2P Mesh box -->
  <rect x="520" y="280" width="520" height="380" rx="8" fill="none" stroke="#CC0000" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="780" y="310" text-anchor="middle" fill="#CC0000" font-weight="bold" font-size="20">P2P Mesh</text>

  <!-- Nodes — N3, N1, N7 highlighted as serving -->
  <rect x="560" y="335" width="58" height="38" rx="4" fill="#CC0000" stroke="#CC0000" stroke-width="2"/><text x="589" y="360" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">N1</text>
  <rect x="660" y="335" width="58" height="38" rx="4" fill="#fff" stroke="#CC0000" stroke-width="2"/><text x="689" y="360" text-anchor="middle" fill="#CC0000" font-size="14" font-weight="bold">N2</text>
  <rect x="760" y="335" width="58" height="38" rx="4" fill="#CC0000" stroke="#CC0000" stroke-width="2"/><text x="789" y="360" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">N3</text>
  <rect x="560" y="415" width="58" height="38" rx="4" fill="#fff" stroke="#CC0000" stroke-width="2"/><text x="589" y="440" text-anchor="middle" fill="#CC0000" font-size="14" font-weight="bold">N4</text>
  <rect x="660" y="415" width="58" height="38" rx="4" fill="#fff" stroke="#CC0000" stroke-width="2"/><text x="689" y="440" text-anchor="middle" fill="#CC0000" font-size="14" font-weight="bold">N5</text>
  <rect x="760" y="415" width="58" height="38" rx="4" fill="#fff" stroke="#CC0000" stroke-width="2"/><text x="789" y="440" text-anchor="middle" fill="#CC0000" font-size="14" font-weight="bold">N6</text>
  <rect x="860" y="415" width="58" height="38" rx="4" fill="#CC0000" stroke="#CC0000" stroke-width="2"/><text x="889" y="440" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">N7</text>
  <rect x="560" y="495" width="58" height="38" rx="4" fill="#fff" stroke="#CC0000" stroke-width="2"/><text x="589" y="520" text-anchor="middle" fill="#CC0000" font-size="14" font-weight="bold">N8</text>
  <rect x="660" y="495" width="58" height="38" rx="4" fill="#fff" stroke="#CC0000" stroke-width="2"/><text x="689" y="520" text-anchor="middle" fill="#CC0000" font-size="14" font-weight="bold">N9</text>
  <rect x="760" y="495" width="58" height="38" rx="4" fill="#fff" stroke="#CC0000" stroke-width="2"/><text x="789" y="520" text-anchor="middle" fill="#CC0000" font-size="14" font-weight="bold">N10</text>

  <!-- Alice -->
  <polygon points="120,515 82,572 158,572" fill="#fff" stroke="#0066CC" stroke-width="2"/>
  <text x="120" y="558" text-anchor="middle" fill="#0066CC" font-size="14" font-weight="bold">Alice</text>

  <!-- Bob (active) -->
  <polygon points="330,515 292,572 368,572" fill="#0066CC" stroke="#0066CC" stroke-width="2"/>
  <text x="330" y="558" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">Bob</text>

  <!-- file.pdf -->
  <rect x="175" y="590" width="42" height="52" rx="2" fill="#f5f5f5" stroke="#666" stroke-width="1.5"/>
  <path d="M183,603 Q196,600 209,603 M183,611 Q196,608 209,611 M183,619 Q196,616 209,619 M183,627 Q196,624 205,627" fill="none" stroke="#999" stroke-width="1"/>
  <text x="196" y="656" text-anchor="middle" fill="#555" font-size="11">file.pdf</text>

  <!-- STEP 8 ARROWS -->
  <!-- Bob -> N3: request manifest -->
  <path d="M368,535 C480,460 680,370 760,354" fill="none" stroke="#0066CC" stroke-width="2" marker-end="url(#ah-b)"/>
  <rect x="460" y="400" width="168" height="20" rx="3" fill="#fff" fill-opacity="0.9"/>
  <text x="544" y="415" text-anchor="middle" fill="#0066CC" font-size="11" font-weight="bold">8a. Request DataManifest</text>

  <!-- N3 -> SUMChain: ACL check (dashed) -->
  <path d="M770,335 C600,280 460,210 440,190" fill="none" stroke="#7B2D8E" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ah-p)"/>
  <rect x="480" y="245" width="175" height="22" rx="3" fill="#fff" fill-opacity="0.9"/>
  <text x="567" y="261" text-anchor="middle" fill="#7B2D8E" font-size="11" font-weight="bold">8b. ACL: getAccessList()</text>

  <!-- Nodes -> Bob: serve chunks -->
  <path d="M560,360 C480,430 400,500 360,530" fill="none" stroke="#CC0000" stroke-width="2" marker-end="url(#ah-r)"/>
  <path d="M860,448 C700,520 500,550 368,555" fill="none" stroke="#CC0000" stroke-width="2" marker-end="url(#ah-r)"/>

  <rect x="385" y="472" width="155" height="20" rx="3" fill="#fff" fill-opacity="0.9"/>
  <text x="462" y="487" text-anchor="middle" fill="#CC0000" font-size="11" font-weight="bold">8c. Serve chunks in parallel</text>

  <!-- Verify note -->
  <rect x="30" y="420" width="220" height="50" rx="5" fill="#f0f8ff" stroke="#0066CC" stroke-width="1"/>
  <text x="140" y="440" text-anchor="middle" fill="#0066CC" font-size="11" font-weight="bold">8d. Bob verifies + reassembles:</text>
  <text x="140" y="456" text-anchor="middle" fill="#333" font-size="11">blake3(chunk) == CID? Concat all</text>
  <text x="140" y="468" text-anchor="middle" fill="#333" font-size="10">-> original file.pdf restored</text>

  <!-- Step label -->
  <text x="30" y="695" fill="#333" font-size="13" font-style="italic">Step 8: Bob requests the manifest, passes ACL, fetches chunks from multiple nodes, verifies, and reassembles file.pdf.</text>
</svg>
